name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          out=kit
          if [ "$GOOS" = "windows" ]; then out=kit.exe; fi
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/$out" ./cmd/kit

      - name: package
        working-directory: dist
        run: |
          name=kit_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "$name.zip" kit.exe
          else
            tar -czf "$name.tar.gz" kit
          fi
          rm -f kit kit.exe

      - uses: actions/upload-artifact@v4
        with:
          name: kit_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*

  msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: install wix
        run: dotnet tool install --global wix

      - name: build kit.exe
        run: go build -trimpath -ldflags "-s -w -X main.version=$env:GITHUB_REF_NAME" -o bin/kit.exe ./cmd/kit

      - name: build msi
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          wix build installer/kit.wxs -arch x64 -d "Version=$version" -o "bin/kit_$($env:GITHUB_REF_NAME)_windows_amd64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: kit_windows_msi
          path: bin/*.msi

  release:
    needs: [binaries, msi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
